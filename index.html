<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chill Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'MultiCraft';
      /*
        FONT SETUP:
        Place MultiCraftFont.ttf in the same folder as index.html.
        The line below will load it automatically.
      */
      src: url('MultiCraftFont.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --surface:  #22223b;
      --surface2: #2d2d4a;
      --border:   #3a3a5c;
      --accent:   #a8dadc;
      --accent2:  #c9b8f5;
      --warm:     #f4a261;
      --text:     #e8e6f0;
      --muted:    #8888aa;
      --font:     'Nunito', sans-serif;
      --font-mc:  'MultiCraft', 'Nunito', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,218,220,0.07) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,184,245,0.07) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0; z-index: 100;
      background: rgba(26,26,46,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 64px;
    }

    .nav-logo {
      font-family: var(--font-mc);
      font-size: 1.3rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-logo .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .nav-tabs { display: flex; gap: 0.25rem; }

    .tab-btn {
      background: none; border: none;
      color: var(--muted);
      font-family: var(--font);
      font-weight: 700; font-size: 0.85rem;
      padding: 0.45rem 1.1rem;
      cursor: pointer; border-radius: 50px;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active { color: var(--bg); background: var(--accent); }

    /* MAIN */
    main {
      position: relative; z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .section { display: none; animation: fadeUp 0.4s ease; }
    .section.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HOME ── */
    .hero-title {
      font-family: var(--font-mc);
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 1.2rem;
      /* subtle gradient on text */
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-code {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 1.1rem;
      margin-bottom: 2rem;
    }

    .hero-code-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .hero-code-value {
      font-family: 'Courier New', monospace;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.08em;
    }

    .copy-btn {
      background: none; border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      font-family: var(--font);
      padding: 0.2rem 0.5rem;
      border-radius: 5px;
      transition: color 0.2s, background 0.2s;
    }
    .copy-btn:hover { color: var(--accent); background: var(--surface2); }

    .intro-divider {
      width: 48px; height: 3px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 2rem 0;
    }

    .intro-body {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.85;
      max-width: 580px;
    }
    .intro-body p + p { margin-top: 1rem; }

    /* ── TEAM ── */
    .section-header { margin-bottom: 2.5rem; }

    .section-title {
      font-size: 1.9rem; font-weight: 900;
      margin-bottom: 0.3rem;
    }

    .section-sub { color: var(--muted); font-size: 0.875rem; }

    .team-group { margin-bottom: 2.5rem; }

    .team-group-label {
      font-size: 0.72rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 0.9rem; padding-left: 0.25rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .team-group-label::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    .team-grid { display: flex; flex-wrap: wrap; gap: 0.9rem; }

    .member-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.5rem;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      flex: 1; min-width: 190px;
    }
    .member-card:hover {
      border-color: var(--accent2);
      background: var(--surface2);
      transform: translateY(-2px);
    }
    .member-card.owner:hover { border-color: var(--warm); }

    .member-name {
      font-weight: 800; font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    .member-role {
      font-size: 0.74rem; font-weight: 700;
      color: var(--accent2);
    }
    .member-card.owner .member-role { color: var(--warm); }

    /* ── CONTACT ── */
    .report-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 540px;
    }

    .form-group { margin-bottom: 1.2rem; }

    .form-group label {
      display: block;
      font-size: 0.77rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 0.45rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem; font-weight: 600;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--border); font-weight: 400; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select option { background: var(--surface); }

    .submit-btn {
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 50px;
      font-family: var(--font); font-weight: 800;
      font-size: 0.9rem; padding: 0.7rem 2rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .submit-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .success-msg {
      display: none;
      background: rgba(168,218,220,0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.85rem 1.1rem;
      color: var(--accent);
      font-size: 0.875rem; font-weight: 700;
      margin-top: 1rem;
    }

    .form-note {
      font-size: 0.75rem; color: var(--muted);
      margin-top: 1rem; line-height: 1.6;
    }

    @media (max-width: 580px) {
      nav { padding: 0 1.25rem; }
      .tab-btn { padding: 0.4rem 0.75rem; font-size: 0.78rem; }
      main { padding: 2.5rem 1.25rem 4rem; }
      .member-card { min-width: 100%; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="dot"></div>
    Chill Server
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('intro', this)">Home</button>
    <button class="tab-btn" onclick="showTab('team', this)">Team</button>
    <button class="tab-btn" onclick="showTab('report', this)">Contact</button>
  </div>
</nav>

<main>

  <!-- ════════════════════════════
       HOME
       ════════════════════════════ -->
  <section id="intro" class="section active">

    <h1 class="hero-title">Chill Server</h1>

    <!-- SERVER CODE — edit the code value below -->
    <div class="hero-code">
      <span class="hero-code-label">Server Code</span>
      <!-- START EDIT: Replace with your actual server code -->
      <span class="hero-code-value" id="serverCode">IUIOFJRN</span>
      <!-- END EDIT -->
      <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>

    <div class="intro-divider"></div>

    <div class="intro-body">
      <!-- START EDIT: Replace these paragraphs with your own intro text -->
      <p>
        Join our Server! IUIOFJRN
      </p>
      <!-- END EDIT -->
    </div>

  </section>

  <!-- ════════════════════════════
       TEAM
       ════════════════════════════ -->
  <section id="team" class="section">

    <div class="section-header">
      <h2 class="section-title">Granted players(</h2>
      <p class="section-sub">Staffs/Admins</p>
    </div>

    <div class="team-group">
      <div class="team-group-label">👑 Owners</div>
      <div class="team-grid">
        <div class="member-card owner">
          <div class="member-name">Astxn</div>
          <div class="member-role">Owner</div>
        </div>
        <div class="member-card owner">
          <div class="member-name">Denis</div>
          <div class="member-role">Owner</div>
        </div>
      </div>
    </div>

    <div class="team-group">
      <div class="team-group-label">🛡️ Developers</div>
      <div class="team-grid">
        <div class="member-card">
          <div class="member-name">NotMythxc4l</div>
          <div class="member-role">Developer</div>
        </div>
        <div class="member-card">
          <div class="member-name">Covasius</div>
          <div class="member-role">Developer</div>
        </div>
      </div>
    </div>

  </section>

  <!-- ════════════════════════════
       CONTACT
       ════════════════════════════ -->
  <section id="report" class="section">

    <div class="section-header">
      <h2 class="section-title">Contact Us</h2>
      <p class="section-sub">Questions, concerns, or just want to reach out?</p>
    </div>

    <!--
      FORM SETUP (Formspree — free):
        1. Go to https://formspree.io and sign up with itzmythicx@gmail.com
        2. Create a new form → copy your form ID
        3. Replace YOUR_FORMSPREE_ID below with it
        Submissions will be forwarded to itzmythicx@gmail.com
    -->
    <form
      class="report-form"
      action="https://formspree.io/f/mnjbgbnn"
      method="POST"
      onsubmit="handleSubmit(event)"
    >
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Your username" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="general">General Inquiry</option>
          <option value="bug">Bug Report</option>
          <option value="appeal">Appeal</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="What's up?" required></textarea>
      </div>

      <!-- Hidden field so email goes to correct address -->
      <input type="hidden" name="_replyto" value="itzmythicx@gmail.com" />

      <button type="submit" class="submit-btn">Send it →</button>

      <div class="success-msg" id="successMsg">
        ✓ Thanks!
      </div>

      <p class="form-note">We will respond soon.</p>
    </form>

  </section>

</main>

<script>
  function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function copyCode() {
    const code = document.getElementById('serverCode').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('.submit-btn');
    const msg = document.getElementById('successMsg');

    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { Accept: 'application/json' }
      });
      if (res.ok) {
        form.reset();
        msg.style.display = 'block';
        btn.textContent = 'Sent ✓';
      } else {
        btn.textContent = 'Try again';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'Try again';
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
